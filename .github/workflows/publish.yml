name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Build and package with Gradle
        run: ./gradlew clean build -Pversion=${{ github.event.release.tag_name }}

      - name: Extract Minecraft version from artifact filename
        id: extract_mc_version
        run: |
          ARTIFACT="build/libs/rebrand-${{ github.event.release.tag_name }}+*.jar"
          FILE=$(ls $ARTIFACT)
          echo "Found artifact: $FILE"
          MC_VERSION=$(echo "$FILE" | grep -oP '(?<=\+)[^\.]+(?=\.jar)')
          echo "Extracted Minecraft version: $MC_VERSION"
          echo "::set-output name=mc_version::$MC_VERSION"

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: AABBCCDD
          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}
          loaders: |-
            fabric
          game-versions: ${{ steps.extract_mc_version.outputs.mc_version }}
          files: build/libs/rebrand-${{ github.event.release.tag_name }}+${{ steps.extract_mc_version.outputs.mc_version }}.jar
